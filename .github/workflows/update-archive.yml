name: Update Azure medallion archive

on:
  schedule:
    - cron: "17 6,18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: azure-regional-services-archive
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      AZURE_PRICE_ITEMS_PER_QUERY: "200"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update medallion data
        run: python scripts/update_archive.py

      - name: Commit medallion update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No medallion changes to commit."
          else
            git commit -m "chore(data): update Azure medallion archive $(date -u +%F)"
            git push
          fi

      - name: Build Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R site/. _site/
          cp -R data _site/data
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
